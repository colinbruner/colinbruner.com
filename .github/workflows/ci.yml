name: Deploy Static Website to GCS

on:
  push:
    paths-ignore:
      - "LICENSE"
      - "README.md"
    branches:
      - main
      - develop

  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-22.04
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Determine deploy target
        id: determine_deploy
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            base_url="https://colinbruner.com"
            target="production"
            bucket="gs://colinbruner.com"
          else
            base_url="https://develop.colinbruner.com"
            target="develop"
            bucket="gs://develop.colinbruner.com"
          fi
          echo "base_url=$base_url" >> $GITHUB_OUTPUT
          echo "target=$target" >> $GITHUB_OUTPUT
          echo "bucket=$bucket" >> $GITHUB_OUTPUT

      - name: Install dependencies
        run: npm ci

      - name: Build SvelteKit site
        run: npm run build
        env:
          PUBLIC_BASE_URL: ${{ steps.determine_deploy.outputs.base_url }}

      - name: Authenticate to GCP
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: "${{ secrets.PROVIDER_NAME }}"
          service_account: "${{ secrets.SA_EMAIL }}"

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Sync build to GCS bucket
        run: |
          gcloud storage rsync build/ ${{ steps.determine_deploy.outputs.bucket }} \
            --recursive \
            --delete-unmatched-destination-objects \
            --cache-control="max-age=300, public"
